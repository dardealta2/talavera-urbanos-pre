<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autobuses Urbanos</title>
  <div class="p-3 bg-blue-50 border-b border-gray-200">
    <label for="selector-linea" class="block text-xs font-bold text-blue-900 uppercase tracking-wider mb-1">Seleccionar Línea:</label>
    <select id="selector-linea" class="w-full p-2 bg-white border border-blue-300 rounded-lg text-sm text-blue-900 font-semibold focus:outline-none focus:border-blue-500">
      <option value="linea4">Línea 4 (T. Nueva - Alfar)</option>
      <option value="linea1">Línea 1 (Nueva Línea)</option>
    </select>
  </div>



  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <style>
    #map { height: 50vh; width: 100%; }
    @media (min-width: 768px) {
      #map { height: 100vh; }
    }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased flex flex-col md:flex-row h-screen overflow-hidden">

  <div class="w-full md:w-1/3 bg-white shadow-lg flex flex-col h-1/2 md:h-full z-10">
    <header id="main-header" class="text-white p-4 flex justify-between items-center shadow transition-colors duration-300">
      <h1 id="titulo-header" class="text-xl font-bold tracking-tight">Cargando...</h1>
      <span class="bg-green-500 text-xs px-2 py-1 rounded-full text-white font-semibold">PWA Activa</span>
    </header>
    <!-- Filtros y Selectores (Compactos) -->
<div class="flex border-b border-gray-200 bg-gray-50 flex-col sm:flex-row text-xs">
  
  <!-- Selector de Día -->
  <div class="p-2 bg-gray-100 border-b sm:border-b-0 border-gray-200 flex-1">
    <label for="selector-dia" class="block text-[10px] font-bold text-gray-600 uppercase tracking-wider mb-0.5">Tipo de día:</label>
    <select id="selector-dia" class="w-full p-1.5 bg-white border border-gray-300 rounded-md text-xs text-gray-800 focus:outline-none focus:border-blue-500">
      <option value="regular">Laborables Habituales</option>
      <option value="sabado">Sábados, Agosto y Navidad</option>
      <option value="festivo">Domingos y Festivos</option>
    </select>
  </div>
  
  <!-- Botones IDA / VUELTA (Más delgados y estilizados) -->
  <div class="flex w-full sm:w-auto border-t sm:border-t-0 border-gray-200">
    <button id="btn-ida" class="w-1/2 sm:w-24 py-1.5 px-2 text-center font-medium border-b-2 border-blue-600 text-blue-600 bg-white focus:outline-none text-[11px] transition-all">
      ➡️ IDA
    </button>
    <button id="btn-vuelta" class="w-1/2 sm:w-24 py-1.5 px-2 text-center font-medium text-gray-500 hover:text-gray-700 focus:outline-none text-[11px] transition-all">
      ⬅️ VUELTA
    </button>
  </div>

</div>
    

    <div id="lista-paradas" class="flex-1 overflow-y-auto p-4 space-y-3">
      <p class="text-gray-500 text-center py-4">Cargando paradas...</p>
    </div>
  </div>

  <div id="map" class="flex-grow shadow-inner"></div>

  <script src="app.js"></script>
</body>
</html>
